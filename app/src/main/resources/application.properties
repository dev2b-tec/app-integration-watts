spring.application.name=app-integration-watts

server.port=${SERVER_PORT:8012}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/app_whats}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Evolution API
evolution.api.url=${EVOLUTION_API_URL:http://localhost:8085}
evolution.api.key=${EVOLUTION_API_KEY:dev2b-local-key}

# URL pública deste serviço (usada para registrar webhook na Evolution API)
app.webhook.base-url=${WEBHOOK_BASE_URL:http://host.docker.internal:8012}

# WebSocket CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.conversas=${MINIO_BUCKET_CONVERSAS:conversas}
